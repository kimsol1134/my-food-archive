name: Android validation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Compile release bundle
        run: flutter build appbundle --release

      # CI에는 업로드 키를 넣지 않는다. 이 단계의 AAB는 컴파일 검증용이며,
      # Play Console 업로드는 docs/RELEASE.md의 로컬 서명 절차를 따른다.
