name: Publish reader landing page

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/android/**"
      - "docs/book-screenshots/**"
      - "docs/privacy-policy.md"
      - "scripts/build_android_reader_pages.rb"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build reader guide pages
        run: |
          gem install kramdown:2.5.1 kramdown-parser-gfm:1.1.0 --no-document
          ruby scripts/build_android_reader_pages.rb
          ruby scripts/check_android_reader_pages.rb
      - name: Upload reader site
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
